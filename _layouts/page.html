---
layout: default
---
<div class="page-wrap{% if page.wide %} page-wrap--wide{% endif %}">
  <header class="page-hero">
    <h1 class="page-hero-title">{{ page.title | escape }}</h1>
    {% if page.description %}
    <p class="page-hero-desc">{{ page.description | escape }}</p>
    {% endif %}
  </header>
  <article class="page-content">
    {{ content }}
  </article>
</div>

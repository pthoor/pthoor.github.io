<!DOCTYPE html>
<html lang="{{ site.locale | default: 'en-US' | slice: 0, 2 }}">
<head>
  {% include head.html %}
</head>
<body>
  <div id="reading-progress" aria-hidden="true"></div>
  <a class="skip-link" href="#main-content">Skip to main content</a>
  {% include header.html %}
  <main id="main-content" class="site-main" role="main">
    {{ content }}
  </main>
  {% include footer.html %}
  <button id="back-to-top" aria-label="Back to top">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg>
  </button>

  <script>
  (function(){
    var btn = document.querySelector('.theme-toggle');
    if (!btn) return;
    btn.addEventListener('click', function() {
      var current = document.documentElement.getAttribute('data-theme');
      var next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);

      // Update giscus comment theme
      var giscusFrame = document.querySelector('iframe.giscus-frame');
      if (giscusFrame && giscusFrame.src && giscusFrame.src.indexOf('https://giscus.app') === 0) {
        var giscusTheme = next === 'light' ? 'light' : 'dark';
        giscusFrame.contentWindow.postMessage(
          { giscus: { setConfig: { theme: giscusTheme } } },
          'https://giscus.app'
        );
      }
    });
  })();
  </script>
  <script>
  (function() {
    // --- Code toolbars: language badge + copy button ---
    var langNames = {
      'powershell':'PowerShell','bicep':'Bicep','kql':'KQL','kusto':'KQL',
      'bash':'Bash','shell':'Shell','sh':'Shell','json':'JSON','jsonc':'JSON',
      'yaml':'YAML','python':'Python','javascript':'JavaScript','js':'JavaScript',
      'typescript':'TypeScript','ts':'TypeScript','csharp':'C#','cs':'C#',
      'sql':'SQL','xml':'XML','html':'HTML','css':'CSS','scss':'SCSS',
      'terraform':'Terraform','hcl':'HCL','go':'Go','rust':'Rust','ruby':'Ruby',
      'markdown':'Markdown','dockerfile':'Dockerfile','diff':'Diff','ini':'INI','toml':'TOML'
    };
    var copyIcon = '<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
    var checkIcon = '<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>';

    document.querySelectorAll('div.highlight').forEach(function(highlight) {
      var outer = highlight.closest('.highlighter-rouge');
      var lang = null;
      if (outer) {
        var m = outer.className.match(/language-(\w+)/);
        if (m) lang = m[1].toLowerCase();
      }
      var toolbar = document.createElement('div');
      toolbar.className = 'code-toolbar';

      var label = document.createElement('span');
      label.className = 'code-lang';
      label.textContent = (lang && langNames[lang]) ? langNames[lang] : (lang || '');
      toolbar.appendChild(label);

      var btn = document.createElement('button');
      btn.className = 'code-copy-btn';
      btn.type = 'button';
      btn.setAttribute('aria-label', 'Copy code to clipboard');
      btn.innerHTML = copyIcon + '<span>Copy</span>';

      btn.addEventListener('click', function() {
        var code = highlight.querySelector('code');
        if (!code) return;
        var text = code.innerText;
        var finish = function(ok) {
          btn.innerHTML = (ok ? checkIcon : copyIcon) + '<span>' + (ok ? 'Copied!' : 'Copy') + '</span>';
          if (ok) {
            btn.classList.add('is-copied');
            setTimeout(function() {
              btn.innerHTML = copyIcon + '<span>Copy</span>';
              btn.classList.remove('is-copied');
            }, 2000);
          }
        };
        if (navigator.clipboard) {
          navigator.clipboard.writeText(text).then(function() { finish(true); }).catch(function() { finish(false); });
        } else {
          var ta = document.createElement('textarea');
          ta.value = text; ta.style.cssText = 'position:fixed;opacity:0';
          document.body.appendChild(ta); ta.select(); document.execCommand('copy');
          document.body.removeChild(ta); finish(true);
        }
      });

      toolbar.appendChild(btn);
      highlight.insertBefore(toolbar, highlight.firstChild);
    });

    // --- Wrap tables for horizontal scroll on mobile ---
    document.querySelectorAll('.post-content table').forEach(function(table) {
      if (table.parentElement.classList.contains('table-wrap')) return;
      var wrapper = document.createElement('div');
      wrapper.className = 'table-wrap';
      wrapper.setAttribute('tabindex', '0');
      wrapper.setAttribute('role', 'region');
      wrapper.setAttribute('aria-label', 'Scrollable table');
      table.parentNode.insertBefore(wrapper, table);
      wrapper.appendChild(table);
    });

    // --- Image lightbox ---
    (function() {
      var overlay = document.createElement('div');
      overlay.className = 'lightbox-overlay';
      overlay.setAttribute('role', 'dialog');
      overlay.setAttribute('aria-modal', 'true');
      overlay.setAttribute('aria-label', 'Image preview');
      document.body.appendChild(overlay);

      function closeLightbox() {
        overlay.classList.remove('is-open');
        overlay.innerHTML = '';
      }

      overlay.addEventListener('click', closeLightbox);

      document.querySelectorAll('.post-content img').forEach(function(img) {
        img.addEventListener('click', function() {
          var clone = document.createElement('img');
          clone.src = img.src;
          clone.alt = img.alt;
          clone.addEventListener('click', function(e) { e.stopPropagation(); });
          overlay.innerHTML = '';
          overlay.appendChild(clone);
          overlay.classList.add('is-open');
        });
      });

      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && overlay.classList.contains('is-open')) closeLightbox();
      });
    })();

    // --- Heading anchor links (post content only) ---
    document.querySelectorAll('.post-content h2[id], .post-content h3[id], .post-content h4[id]').forEach(function(h) {
      var a = document.createElement('a');
      a.className = 'heading-anchor';
      a.href = '#' + h.id;
      a.setAttribute('aria-label', 'Permalink to this section');
      a.textContent = '#';
      h.appendChild(a);
    });

    // --- Sidebar TOC: active heading tracking ---
    (function() {
      var sidebar = document.querySelector('.toc-sidebar-nav');
      if (!sidebar) return;
      var links = sidebar.querySelectorAll('a[href^="#"]');
      if (!links.length) return;

      var headingMap = [];
      links.forEach(function(link) {
        var id = link.getAttribute('href').slice(1);
        var el = document.getElementById(id);
        if (el) headingMap.push({ id: id, el: el, link: link });
      });

      function setActive(id) {
        links.forEach(function(l) { l.classList.remove('toc-active'); });
        headingMap.forEach(function(item) {
          if (item.id === id) {
            item.link.classList.add('toc-active');
            // Scroll the sidebar to keep active item visible
            var sidebarEl = document.querySelector('.toc-sidebar');
            if (sidebarEl && item.link.offsetTop > sidebarEl.clientHeight) {
              sidebarEl.scrollTop = item.link.offsetTop - sidebarEl.clientHeight / 3;
            }
          }
        });
      }

      if ('IntersectionObserver' in window) {
        var currentId = null;
        var observer = new IntersectionObserver(function(entries) {
          // Find the topmost visible heading
          var visible = [];
          entries.forEach(function(entry) {
            if (entry.isIntersecting) {
              visible.push(entry);
            }
          });
          if (visible.length > 0) {
            // Pick the one closest to the top of the viewport
            visible.sort(function(a, b) { return a.boundingClientRect.top - b.boundingClientRect.top; });
            currentId = visible[0].target.id;
            setActive(currentId);
          }
        }, {
          rootMargin: '-80px 0px -60% 0px',
          threshold: 0
        });

        headingMap.forEach(function(item) { observer.observe(item.el); });

        // Also track scroll for cases where no heading is intersecting
        var scrollTimeout;
        window.addEventListener('scroll', function() {
          clearTimeout(scrollTimeout);
          scrollTimeout = setTimeout(function() {
            var found = null;
            for (var i = headingMap.length - 1; i >= 0; i--) {
              var rect = headingMap[i].el.getBoundingClientRect();
              if (rect.top <= 120) {
                found = headingMap[i].id;
                break;
              }
            }
            if (found && found !== currentId) {
              currentId = found;
              setActive(currentId);
            }
          }, 50);
        }, { passive: true });
      }
    })();

    // --- Reading progress bar (post pages only) ---
    var bar = document.getElementById('reading-progress');
    if (bar && document.querySelector('.post-content')) {
      var onScroll = function() {
        var h = document.documentElement;
        var scrollable = h.scrollHeight - h.clientHeight;
        bar.style.width = (scrollable > 0 ? Math.min((h.scrollTop / scrollable) * 100, 100) : 0) + '%';
      };
      window.addEventListener('scroll', onScroll, { passive: true });
      onScroll();
    }

    // --- Back to top button ---
    var topBtn = document.getElementById('back-to-top');
    if (topBtn) {
      window.addEventListener('scroll', function() {
        topBtn.classList.toggle('is-visible', window.scrollY > 400);
      }, { passive: true });
      topBtn.addEventListener('click', function() {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    }

    // --- Inline search ---
    var searchOpenBtn  = document.getElementById('search-open');
    var searchCloseBtn = document.getElementById('search-close');
    var searchInput    = document.getElementById('search-input');
    var searchResults  = document.getElementById('search-results');
    var searchHint     = document.getElementById('search-hint');
    var searchBox      = document.getElementById('search-box');
    var searchDropdown = document.getElementById('search-dropdown');
    var lunrIdx, searchDocs, lunrReady = false, lunrLoading = false;

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function runSearch(query) {
      query = (query || '').trim();
      if (!query) {
        if (searchResults) searchResults.innerHTML = '';
        if (searchHint) searchHint.textContent = 'Type to search across all posts. Press Esc to close.';
        return;
      }
      if (!lunrReady) { if (searchHint) searchHint.textContent = 'Loading search index\u2026'; return; }
      var hits;
      try { hits = lunrIdx.search(query + '* ' + query); } catch(e) { hits = []; }
      var seen = {};
      hits = hits.filter(function(h) { if (seen[h.ref]) return false; seen[h.ref] = true; return true; });
      if (!hits.length) {
        if (searchHint) searchHint.textContent = '';
        if (searchResults) searchResults.innerHTML = '<p class="search-no-results">No results for <strong>' + escHtml(query) + '</strong></p>';
        return;
      }
      if (searchHint) searchHint.textContent = hits.length + ' result' + (hits.length === 1 ? '' : 's') + ' for \u201c' + query + '\u201d';
      var html = '<ul class="search-results-list">';
      hits.slice(0, 8).forEach(function(hit) {
        var doc = searchDocs.find(function(d) { return d.url === hit.ref; });
        if (!doc) return;
        html += '<li><a href="' + escHtml(doc.url) + '" class="search-result-card">';
        html += '<span class="search-result-title">' + escHtml(doc.title) + '</span>';
        if (doc.tags && doc.tags.length) {
          html += '<span class="search-result-tags">';
          doc.tags.forEach(function(t) { html += '<span class="tag tag--small">' + escHtml(t) + '</span>'; });
          html += '</span>';
        }
        if (doc.excerpt) html += '<span class="search-result-excerpt">' + escHtml(doc.excerpt) + '</span>';
        html += '<span class="search-result-date">' + escHtml(doc.date) + '</span>';
        html += '</a></li>';
      });
      html += '</ul>';
      if (searchResults) searchResults.innerHTML = html;
    }

    function loadLunr() {
      if (lunrLoading) return;
      lunrLoading = true;
      var s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/lunr@2.3.9/lunr.min.js';
      s.integrity = 'sha384-203J0SNzyqHby3iU6hzvzltrWi/M41wOP5Gu+BiJMz5nwKykbkUx8Kp7iti0Lpli';
      s.crossOrigin = 'anonymous';
      s.onload = function() {
        fetch('{{ "/search.json" | relative_url }}')
          .then(function(r) { return r.json(); })
          .then(function(data) {
            searchDocs = data;
            lunrIdx = lunr(function() {
              this.ref('url');
              this.field('title', { boost: 10 });
              this.field('tags', { boost: 5 });
              this.field('excerpt', { boost: 2 });
              this.field('content');
              data.forEach(function(doc) {
                this.add({ url: doc.url, title: doc.title, tags: (doc.tags||[]).join(' '), excerpt: doc.excerpt, content: doc.content });
              }, this);
            });
            lunrReady = true;
            if (searchInput && searchInput.value) runSearch(searchInput.value);
          });
      };
      document.head.appendChild(s);
    }

    function openSearch() {
      if (!searchBox) return;
      searchBox.classList.add('is-open');
      if (searchDropdown) searchDropdown.classList.add('is-open');
      if (searchOpenBtn) searchOpenBtn.setAttribute('aria-expanded', 'true');
      if (searchInput) { searchInput.focus(); searchInput.select(); }
      loadLunr();
    }

    function closeSearch() {
      if (!searchBox) return;
      searchBox.classList.remove('is-open');
      if (searchDropdown) searchDropdown.classList.remove('is-open');
      if (searchOpenBtn) searchOpenBtn.setAttribute('aria-expanded', 'false');
      if (searchInput) searchInput.value = '';
      if (searchResults) searchResults.innerHTML = '';
      if (searchHint) searchHint.textContent = 'Type to search across all posts. Press Esc to close.';
    }

    if (searchOpenBtn)  searchOpenBtn.addEventListener('click', openSearch);
    if (searchCloseBtn) searchCloseBtn.addEventListener('click', closeSearch);
    if (searchInput)    searchInput.addEventListener('input', function() { runSearch(this.value); });

    // Close when clicking outside the search box and dropdown
    document.addEventListener('click', function(e) {
      if (searchBox && searchBox.classList.contains('is-open')) {
        if (!searchBox.contains(e.target) && !(searchDropdown && searchDropdown.contains(e.target))) {
          closeSearch();
        }
      }
    });

    document.addEventListener('keydown', function(e) {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        searchBox && searchBox.classList.contains('is-open') ? closeSearch() : openSearch();
      }
      if (e.key === 'Escape' && searchBox && searchBox.classList.contains('is-open')) closeSearch();
      // '/' key to open search when not in a text field
      if (e.key === '/' && !e.metaKey && !e.ctrlKey && !e.altKey) {
        var tag = document.activeElement && document.activeElement.tagName.toLowerCase();
        if (tag !== 'input' && tag !== 'textarea' && tag !== 'select') {
          e.preventDefault();
          openSearch();
        }
      }
    });
  })();
  </script>

  {% if page.mermaid %}
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js" integrity="sha384-ZdL2yczGFPmFmvgeJk0pflXqCy61AlFbPR9gBjoDJVDYC0RMx2l9am0fGE40YnfI" crossorigin="anonymous"></script>
  <script>
  (function(){
    var theme = document.documentElement.getAttribute('data-theme') === 'light' ? 'default' : 'dark';
    mermaid.initialize({startOnLoad:true,theme:theme,securityLevel:'strict'});
  })();
  </script>
  {% endif %}
</body>
</html>

<!DOCTYPE html>
<html lang="{{ site.locale | default: 'en-US' | slice: 0, 2 }}" data-theme="dark">
<head>
  {% include head.html %}
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>
  {% include header.html %}
  <main id="main-content" class="site-main" role="main">
    {{ content }}
  </main>
  {% include footer.html %}
  {% if page.mermaid %}
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js" integrity="sha384-ZdL2yczGFPmFmvgeJk0pflXqCy61AlFbPR9gBjoDJVDYC0RMx2l9am0fGE40YnfI" crossorigin="anonymous"></script>
  <script>mermaid.initialize({startOnLoad:true,theme:'dark',securityLevel:'strict'});</script>
  {% endif %}
</body>
</html>

<!DOCTYPE html>
<html lang="{{ site.locale | default: 'en-US' | slice: 0, 2 }}">
<head>
  {% include head.html %}
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>
  {% include header.html %}
  <main id="main-content" class="site-main" role="main">
    {{ content }}
  </main>
  {% include footer.html %}
  <script>
  (function(){
    var btn = document.querySelector('.theme-toggle');
    if (!btn) return;
    btn.addEventListener('click', function() {
      var current = document.documentElement.getAttribute('data-theme');
      var next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });
  })();
  </script>
  {% if page.mermaid %}
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js" integrity="sha384-ZdL2yczGFPmFmvgeJk0pflXqCy61AlFbPR9gBjoDJVDYC0RMx2l9am0fGE40YnfI" crossorigin="anonymous"></script>
  <script>
  (function(){
    var theme = document.documentElement.getAttribute('data-theme') === 'light' ? 'default' : 'dark';
    mermaid.initialize({startOnLoad:true,theme:theme,securityLevel:'strict'});
  })();
  </script>
  {% endif %}
</body>
</html>

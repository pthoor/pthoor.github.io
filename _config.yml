# Site Settings
locale: "en-US"
title: "thoor.tech"
title_separator: "-"
name: "Pierre Thoor"
description: "Cybersecurity guy writing and talking about secure Microsoft Cloud stuff"
url: "https://thoor.tech"
baseurl: ""
repository: "pthoor/pthoor.github.io"
og_image: "/assets/og-default.jpg"

# Author
author:
  name: "Pierre Thoor"
  title: "Senior Cloud Security Architect"
  company: "Onevinn AB"
  avatar: "/assets/profile-pic.jpg"
  speaker_photo: "/assets/speaker-photo.JPG"
  bio: "I secure Microsoft Cloud environments at enterprise scale — from Sentinel detection engineering and Defender XDR threat hunting to Azure network architecture, email security, and GitHub DevSecOps."
  location: "Sweden"
  sessionize: "https://sessionize.com/pierre-thoor/"
  mvp_profile: "https://mvp.microsoft.com/en-us/PublicProfile/5004683?fullName=Pierre%20Thoor"
  links:
    - label: "Email"
      icon: "email"
      url: "mailto:pierre@thoor.tech"
    - label: "Twitter"
      icon: "twitter"
      url: "https://twitter.com/PierreThoor"
    - label: "GitHub"
      icon: "github"
      url: "https://github.com/pthoor"
    - label: "LinkedIn"
      icon: "linkedin"
      url: "https://www.linkedin.com/in/pierrethoor/"
    - label: "Bluesky"
      icon: "bluesky"
      url: "https://bsky.app/profile/pierrethoor.bsky.social"

# Credential badges shown in hero
credentials:
  - label: "Microsoft Security MVP"
    class: "badge-mvp"
  - label: "Published Author"
    class: "badge-author"
  - label: "Conference Speaker"
    class: "badge-speaker"
  - label: "MDO Champion"
    class: "badge-mdo"

# Book
book:
  title: "Microsoft Defender for Identity in Depth"
  subtitle: "An exhaustive guide to ITDR, breach prevention, and cyberattack response"
  publisher: "Packt Publishing"
  year: 2024
  url: "https://www.packtpub.com/en-us/product/microsoft-defender-for-identity-in-depth-9781835082850"
  amazon_url: "https://www.amazon.com/Microsoft-Defender-Identity-Depth-cyberattack/dp/B0DK1HW2KX"

# MDO Champion highlight
mdo_champion:
  description: "Co-authored a four-part guide to securing Microsoft Teams collaboration with the Defender for Office 365 product engineering team — covering user reporting, Safe Links, and advanced threat hunting for Teams protection."
  post_url: "https://techcommunity.microsoft.com/blog/microsoftdefenderforoffice365blog/safeguarding-microsoft-teams-with-microsoft-defender-for-office-365/4464086"
  video_url: "https://www.youtube.com/playlist?list=PLmAptfqzxVEUnmX3No1ZCCpU96Y9A-6PE"

# Topic definitions — used by homepage and topic landing pages
topics:
  - name: "Microsoft Sentinel"
    slug: "sentinel"
    description: "SIEM/SOAR design · KQL · Detection engineering · Threat hunting · Log analytics"
    color: "blue"
    icon: "sentinel"
    tags:
      - "Sentinel"
      - "sentinel"
      - "Kusto"
      - "kusto"
      - "KQL"
  - name: "Defender XDR"
    slug: "defender"
    description: "Identity · Endpoint · Cloud Apps · Defender for Cloud · CSPM · CWPP"
    color: "purple"
    icon: "defender"
    tags:
      - "Defender"
      - "MDC"
      - "DefenderforCloud"
      - "Defender for Cloud"
      - "CSPM"
      - "MDI"
      - "MDE"
      - "Copilot for Security"
  - name: "Email & Teams Security"
    slug: "email-security"
    description: "Defender for Office 365 · Exchange Online Protection · Teams · MDO Champion"
    color: "orange"
    icon: "mail"
    tags:
      - "MDO"
      - "Defender for Office"
      - "Exchange Online"
      - "Teams"
  - name: "Azure Networking"
    slug: "networking"
    description: "AVNM · Azure Firewall · WAF · DDoS · Private Endpoints · Hub-spoke"
    color: "green"
    icon: "network"
    tags:
      - "Azure"
      - "Networking"
      - "AVNM"
      - "Firewall"
      - "WAF"
  - name: "GitHub Security"
    slug: "github"
    description: "Actions security · Supply chain · Org rulesets · Advanced Security · DevSecOps"
    color: "gray"
    icon: "github"
    tags:
      - "GitHub"
  - name: "IaC & Automation"
    slug: "iac"
    description: "Bicep · Azure Verified Modules · PowerShell · Azure Policy · GitHub Actions CI/CD"
    color: "blue-light"
    icon: "code"
    tags:
      - "Bicep"
      - "PowerShell"
      - "AVM"
      - "Azure Policy"

# Footer
footer:
  links:
    - label: "Twitter"
      url: "https://twitter.com/PierreThoor"
    - label: "GitHub"
      url: "https://github.com/pthoor"
    - label: "Bluesky"
      url: "https://bsky.app/profile/pierrethoor.bsky.social"

# Social / SEO
twitter:
  username: "PierreThoor"

# Analytics
analytics:
  provider: "google-gtag"
  google:
    tracking_id: "G-WZZHMWX8JQ"
    anonymize_ip: "true"

# Reading Files
include:
  - _pages
  - topics
exclude:
  - vendor
  - .bundle
  - .sass-cache
  - .jekyll-cache
  - node_modules
  - Gemfile
  - Gemfile.lock
  - package.json
  - package-lock.json
  - Rakefile
  - README.md
  - LICENSE
  - CHANGELOG.md
  - CONTRIBUTING.md
  - docs
  - test
  - "*.gemspec"
  - .travis.yml
  - staticman.yml
  - banner.js
keep_files:
  - .git

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:title/
paginate: 5
paginate_path: /page:num/
timezone: "Europe/Stockholm"

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      read_time: true
      share: true
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: page

# Comments (Giscus - GitHub Discussions)
comments:
  provider: "giscus"
  giscus:
    repo: "pthoor/pthoor.github.io"
    repo_id: "R_kgDOI41bMw"
    category: "Comments"
    category_id: "DIC_kwDOI41bM84C4QFC"
    mapping: "url"
    strict: "0"
    reactions_enabled: "1"
    emit_metadata: "0"
    input_position: "bottom"
    lang: "en"

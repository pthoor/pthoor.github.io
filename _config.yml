# ============================================================
# Thoor.tech - Custom Jekyll Blog
# Pierre Thoor - Cybersecurity & Microsoft Cloud
# ============================================================

# Site Settings
locale: "en-US"
title: "Thoor.tech"
title_separator: "-"
name: "Pierre Thoor"
description: "Cybersecurity guy writing and talking about secure Microsoft Cloud stuff"
url: "https://thoor.tech"
baseurl: ""
repository: "pthoor/pthoor.github.io"

# Author
author:
  name: "Pierre Thoor"
  avatar: "/assets/profile-pic.jpg"
  bio: "Cybersecurity guy writing and talking about secure Microsoft Cloud stuff"
  location: "Sweden"
  links:
    - label: "Email"
      url: "mailto:pierre@thoor.tech"
    - label: "Twitter"
      url: "https://twitter.com/PierreThoor"
    - label: "GitHub"
      url: "https://github.com/pthoor"

# Footer
footer:
  links:
    - label: "Twitter"
      url: "https://twitter.com/PierreThoor"
    - label: "GitHub"
      url: "https://github.com/pthoor"

# Social / SEO
twitter:
  username: "PierreThoor"

# Analytics
analytics:
  provider: "google-gtag"
  google:
    tracking_id: "G-WZZHMWX8JQ"
    anonymize_ip: "true"

# Reading Files
include:
  - _pages
exclude:
  - vendor
  - .bundle
  - .sass-cache
  - .jekyll-cache
  - node_modules
  - Gemfile
  - Gemfile.lock
  - package.json
  - package-lock.json
  - Rakefile
  - README.md
  - LICENSE
  - CHANGELOG.md
  - CONTRIBUTING.md
  - docs
  - test
  - "*.gemspec"
  - .travis.yml
  - staticman.yml
  - banner.js
keep_files:
  - .git

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
paginate: 5
paginate_path: /page:num/
timezone: "Europe/Stockholm"

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      read_time: true
      share: true
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: page

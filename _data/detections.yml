- slug: rare-external-domains-with-clicks-teams
  title: Rare External Domains With Clicks Teams
  description: ''
  severity: info
  product: ''
  platform: ''
  tags: []
  mitre: []
  status: stable
  created: ''
  kql: "// Rare External Domains with Clicks in Teams (Detection Rule)\n// Surfaces\
    \ rare external domains in Teams and associated user clicks for incident response\n\
    // Source: https://techcommunity.microsoft.com/blog/microsoftdefenderforoffice365blog/safeguarding-microsoft-teams-with-microsoft-defender-for-office-365/4464086\n\
    let lookback = 1d;\n// Improved: threshold is now a variable for easier tuning\n\
    let rareDomainThreshold = 3;\n// External Teams messages\nlet externalMsgs =\n\
    \    MessageEvents\n    | where Timestamp > ago(lookback) and IsExternalThread\
    \ == true\n    | project MsgTime = Timestamp, TeamsMessageId, SenderEmailAddress,\
    \ ME_ReportId = ReportId;\n// URLs found in Teams messages\nlet urlsInMsgs =\n\
    \    MessageUrlInfo\n    | where Timestamp > ago(lookback)\n    | project MUI_Time\
    \ = Timestamp, TeamsMessageId, Url, UrlDomain, MUI_ReportId = ReportId;\n// Clicks\
    \ coming from Teams\nlet clicks =\n    UrlClickEvents\n    | where Timestamp >\
    \ ago(lookback) and Workload == \"Teams\"\n    | project ClickTime = Timestamp,\
    \ Url, Clicker = AccountUpn, ClickAction = ActionType, UCE_ReportId = ReportId;\n\
    // Define \"rare\" domains in the period\nlet rareDomains =\n    urlsInMsgs\n\
    \    | summarize msgCount = dcount(TeamsMessageId) by UrlDomain\n    | where msgCount\
    \ < rareDomainThreshold;\nrareDomains\n| join kind=inner (urlsInMsgs) on UrlDomain\n\
    | join kind=leftouter (externalMsgs) on TeamsMessageId\n| join kind=leftouter\
    \ (clicks) on Url\n| project\n    Timestamp = coalesce(ClickTime, MUI_Time, MsgTime),\n\
    \    UrlDomain,\n    Url,\n    SenderEmailAddress,\n    Clicker,\n    ClickTime,\n\
    \    ClickAction,\n    TeamsMessageId,\n    ReportId = coalesce(UCE_ReportId,\
    \ MUI_ReportId, ME_ReportId)\n// Added: deduplicate rows from multiple clicks\
    \ on the same URL\n| distinct *"

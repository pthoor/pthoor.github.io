  kql: "// IT Helpdesk Imposters in External DMs\n// Surface social-engineering lures\
    \ impersonating support over last 5 days\n// Source: https://techcommunity.microsoft.com/blog/microsoftdefenderforoffice365blog/safeguarding-microsoft-teams-with-microsoft-defender-for-office-365/4464086\n\
    let lookback = 5d;\nMessageEvents\n| where Timestamp > ago(lookback)\n| where\
    \ IsExternalThread == true\n// Improved: use \"helpdesk\"/\"help desk\" patterns\
    \ and case-sensitive \"IT\" to reduce false positives\n| where (RecipientDetails\
    \ has \"helpdesk\" or RecipientDetails has \"help desk\")\n   or (RecipientDetails\
    \ has_cs \"IT\" and RecipientDetails has \"support\")\n   or (SenderDisplayName\
    \ has \"helpdesk\" or SenderDisplayName has \"help desk\")\n   or (SenderDisplayName\
    \ has_cs \"IT\" and SenderDisplayName has \"support\")\n// Separated: \"working\
    \ from home\" is a different social-engineering lure category\n   or (RecipientDetails\
    \ has \"working\" and RecipientDetails has \"home\")\n   or (SenderDisplayName\
    \ has \"working\" and SenderDisplayName has \"home\")\n| project Timestamp, SenderDisplayName,\
    \ SenderEmailAddress,\n         RecipientDetails, IsOwnedThread, ThreadType, ReportId"

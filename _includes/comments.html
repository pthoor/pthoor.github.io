{% if site.comments.provider == "giscus" and page.comments != false %}
<section class="post-comments" id="comments">
  <script>
  (function() {
    var theme = document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
    var s = document.createElement('script');
    s.src = 'https://giscus.app/client.js';
    s.setAttribute('data-repo', '{{ site.comments.giscus.repo }}');
    s.setAttribute('data-repo-id', '{{ site.comments.giscus.repo_id }}');
    s.setAttribute('data-category', '{{ site.comments.giscus.category }}');
    s.setAttribute('data-category-id', '{{ site.comments.giscus.category_id }}');
    s.setAttribute('data-mapping', '{{ site.comments.giscus.mapping }}');
    s.setAttribute('data-strict', '{{ site.comments.giscus.strict | default: "0" }}');
    s.setAttribute('data-reactions-enabled', '{{ site.comments.giscus.reactions_enabled }}');
    s.setAttribute('data-emit-metadata', '{{ site.comments.giscus.emit_metadata }}');
    s.setAttribute('data-input-position', '{{ site.comments.giscus.input_position }}');
    s.setAttribute('data-lang', '{{ site.comments.giscus.lang }}');
    s.setAttribute('data-theme', theme);
    s.setAttribute('crossorigin', 'anonymous');
    s.async = true;
    document.getElementById('comments').appendChild(s);
  })();
  </script>
</section>
{% endif %}

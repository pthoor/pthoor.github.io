<header class="site-header" role="banner">
  <div class="header-inner">

    <a href="{{ '/' | relative_url }}" class="site-brand" aria-label="{{ site.title }} – Home">
      <span class="brand-logo" aria-hidden="true">
        <span class="brand-logo-q brand-logo-q1"></span>
        <span class="brand-logo-q brand-logo-q2"></span>
        <span class="brand-logo-q brand-logo-q3"></span>
        <span class="brand-logo-q brand-logo-q4"></span>
      </span>
      <span class="brand-name">thoor.tech</span>
    </a>

    <nav class="site-nav" aria-label="Main navigation">
      <ul class="nav-links" id="nav-links" role="list">
        {% for link in site.data.navigation.main %}
        <li>
          <a href="{{ link.url | relative_url }}"
            {% if page.url == link.url or page.url == link.url | append: 'index.html' %}
              aria-current="page" class="nav-link nav-link--active"
            {% else %}
              class="nav-link"
            {% endif %}>
            {{ link.title | escape }}
          </a>
        </li>
        {% endfor %}
      </ul>
    </nav>

    <div class="header-actions">
      <div class="search-box" id="search-box">
        <button class="search-toggle" id="search-open" aria-label="Search posts" aria-expanded="false">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
            <path d="M10.68 11.74a6 6 0 0 1-7.922-8.982 6 6 0 0 1 8.982 7.922l3.04 3.04a.749.749 0 0 1-.326 1.275.749.749 0 0 1-.734-.215ZM11.5 7a4.499 4.499 0 1 0-8.997 0A4.499 4.499 0 0 0 11.5 7Z"/>
          </svg>
          <span class="search-kbd" aria-hidden="true"><kbd>/</kbd></span>
        </button>
        <div class="search-inline-row" id="search-inline-row">
          <svg class="search-inline-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
          </svg>
          <input type="search" id="search-input" class="search-inline-input" placeholder="Search posts…" autocomplete="off" spellcheck="false" aria-label="Search posts">
          <button class="search-inline-close" id="search-close" aria-label="Close search">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
            </svg>
          </button>
        </div>
      </div>

      <button class="theme-toggle" aria-label="Toggle dark/light theme">
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 18a6 6 0 1 1 0-12 6 6 0 0 1 0 12zm0-2a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM11 1h2v3h-2V1zm0 19h2v3h-2v-3zM3.515 4.929l1.414-1.414L7.05 5.636 5.636 7.05 3.515 4.93zM16.95 18.364l1.414-1.414 2.121 2.121-1.414 1.414-2.121-2.121zm2.121-14.85l1.414 1.415-2.121 2.121-1.414-1.414 2.121-2.121zM5.636 16.95l1.414 1.414-2.121 2.121-1.414-1.414 2.121-2.121zM23 11v2h-3v-2h3zM4 11v2H1v-2h3z"/>
        </svg>
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M10 7a7 7 0 0 0 12 4.9v.1c0 5.523-4.477 10-10 10S2 17.523 2 12 6.477 2 12 2h.1A6.979 6.979 0 0 0 10 7zm-6 5a8 8 0 0 0 15.062 3.762A9 9 0 0 1 8.238 4.938 7.999 7.999 0 0 0 4 12z"/>
        </svg>
      </button>

      <button class="nav-toggle" aria-expanded="false" aria-controls="nav-links" aria-label="Toggle navigation menu">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
        </svg>
      </button>
    </div>

  </div>

  <div class="search-dropdown" id="search-dropdown" aria-live="polite">
    <div class="search-dropdown-inner">
      <p class="search-hint" id="search-hint">Type to search across all posts. Press <kbd>Esc</kbd> to close.</p>
      <div id="search-results"></div>
    </div>
  </div>

  <script>
  (function(){
    var toggle = document.querySelector('.nav-toggle');
    var nav    = document.getElementById('nav-links');
    if (toggle && nav) {
      toggle.addEventListener('click', function() {
        var expanded = toggle.getAttribute('aria-expanded') === 'true';
        toggle.setAttribute('aria-expanded', String(!expanded));
        nav.classList.toggle('is-open');
      });
      nav.querySelectorAll('a').forEach(function(a) {
        a.addEventListener('click', function() {
          toggle.setAttribute('aria-expanded', 'false');
          nav.classList.remove('is-open');
        });
      });
    }
  })();
  </script>
</header>

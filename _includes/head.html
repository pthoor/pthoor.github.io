<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">

<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="preload" href="{{ '/assets/fonts/InterVariable.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin>

<link rel="icon" href="{{ '/assets/favicon.svg' | relative_url }}" type="image/svg+xml">

{% include seo.html %}

{% unless site.atom_feed.hide %}
<link href="{% if site.atom_feed.path %}{{ site.atom_feed.path }}{% else %}{{ '/feed.xml' | relative_url }}{% endif %}" type="application/atom+xml" rel="alternate" title="{{ site.title }} Feed">
{% endunless %}

<!-- Fonts are self-hosted (see _sass/thoor/_fonts.scss) – no external CDN -->

<!-- Theme detection (runs before CSS to prevent flash) -->
<script>
(function(){
  var saved = localStorage.getItem('theme');
  if (saved !== 'light' && saved !== 'dark') saved = null;
  var theme = saved || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
  document.documentElement.setAttribute('data-theme', theme);
})();
</script>

<!-- Styles -->
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

{% if page.mermaid %}
<style>
  /* Hide raw mermaid source until mermaid.js transforms it.
     Covers both Rouge-wrapped (.highlighter-rouge) and bare (<pre><code>) output. */
  .language-mermaid.highlighter-rouge,
  pre > code.language-mermaid { visibility: hidden; }
  pre.mermaid, div.mermaid { visibility: visible; }
</style>
{% endif %}

{% if site.analytics.provider == "google-gtag" and site.analytics.google.tracking_id %}
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id={{ site.analytics.google.tracking_id }}"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', '{{ site.analytics.google.tracking_id }}'{% if site.analytics.google.anonymize_ip %}, { 'anonymize_ip': true }{% endif %});
</script>
{% endif %}

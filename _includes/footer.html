<footer class="site-footer" role="contentinfo">
  <div class="footer-inner">
    <div class="footer-copy">
      &copy; {{ site.time | date: '%Y' }} {{ site.author.name }}. {{ site.title }}.
    </div>
    <ul class="footer-links">
      {% for link in site.footer.links %}
        {% if link.url %}
        <li><a href="{{ link.url }}" rel="noopener noreferrer" aria-label="{{ link.label }}">{{ link.label }}</a></li>
        {% endif %}
      {% endfor %}
    </ul>
  </div>
</footer>
